name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/setup.yml

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore bun store
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test -- --passWithNoTests

  build:
    name: Type-check and build
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore bun store
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and type-check
        run: |
          bunx vite build
          bunx tsc -b --noEmit

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV="${{ steps.prev_tag.outputs.tag }}"

          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s (%h)" --no-merges)

          FEATURES=""
          FIXES=""
          REFACTORS=""
          STYLES=""
          CHORES=""
          DOCS=""

          while IFS= read -r line; do
            case "$line" in
              feat*) FEATURES="$FEATURES\n- $line" ;;
              fix*)  FIXES="$FIXES\n- $line" ;;
              refactor*) REFACTORS="$REFACTORS\n- $line" ;;
              style*) STYLES="$STYLES\n- $line" ;;
              docs*) DOCS="$DOCS\n- $line" ;;
              chore*) CHORES="$CHORES\n- $line" ;;
            esac
          done <<< "$COMMITS"

          BODY="## chore(release): $TAG\n"

          [ -n "$FEATURES" ]  && BODY="$BODY\n### Features\n$FEATURES\n"
          [ -n "$FIXES" ]     && BODY="$BODY\n### Bug Fixes\n$FIXES\n"
          [ -n "$REFACTORS" ] && BODY="$BODY\n### Refactors\n$REFACTORS\n"
          [ -n "$STYLES" ]    && BODY="$BODY\n### Styles\n$STYLES\n"
          [ -n "$DOCS" ]      && BODY="$BODY\n### Docs\n$DOCS\n"
          [ -n "$CHORES" ]    && BODY="$BODY\n### Chores\n$CHORES\n"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          printf "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
